<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Header Section of flipkart</title>
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="index.css">

  </head>
  <body>
    <header>
      <!--main-->
      <div id="main">
        <!--upeer-->
        <div id="upper">
          <!--left-->
          <div id="leftLogo">
            <div id="flipkart">

              <img src="https://rukminim2.flixcart.com/fk-p-flap/92/36/image/31f7e3af490c225f.png?q=60" alt="flipkart logo" />
            </div>

            <div id="travel">
             <i class="fa-solid fa-plane-up" ></i>
           <p id="textTravel">Travel</p>
            </div>
          </div>
          <!--right-->
          <div id="rightLocation">
 <i class="fa-solid fa-location-dot"></i>
      Location not set 
      <a href="#">Select delivery location</a>          </div>
        </div>

        <!--lower-->
        <div id="lower">
          <div id="search">
          <i class="fa-solid fa-magnifying-glass"></i>
            <input id="searching"
              type="text"
              placeholder="Search for Products, Brands and More"
            />
          </div>
          <div id="lowerLeft">
            <div class="dropdown">
              <i class="fa-solid fa-user-clock"></i>
              <label>Login</label>
             <select>
              <option></option>
             </select>
            </div>
           
          <div class="dropdown">
              <label>More</label>
             <select>
              <option></option>
             </select>
          </div>

          <div class="dropdown">
              <i class="fa-solid fa-cart-shopping"></i>
            <a href="">Cart</a>

          </div>
        </div>
      </div>
    </header>
  </body>
</html>
