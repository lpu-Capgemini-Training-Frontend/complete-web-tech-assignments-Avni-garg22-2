<!doctype html>
<html lang="en">
  <head>

  </head>
  <body>
    <header id="header">
      <h3>Quiz Application</h3>

    <main id="main">
      <section>
        
        <p><strong>Q1. Why you guys come to the class late?</strong></p>
        <label for="qns01"><strong>A. </strong>traffic </label><input type="radio" name="q1" value="traffic" id="qns01" />
        <label for="qns02"><strong>B. </strong>breakfast </label><input type="radio" name="q1" value="breakfast" id="qns02" />
        <label for="qns001"><strong>C. </strong>sleep </label><input type="radio" name="q1" value="sleep" id="qns001"/>
        <label for="qns03"><strong>D. </strong>other </label><input type="radio" name="q1" value="other" id="qns03"/>
<br>
        <p class="correct" id="qns1ans">Correct!</p>
        <p class="incorrect" id="qns001ans">Incorrect!</p>

        <p><strong>Q2. Why I ask so many Questions?</strong></p>
        <label for="qns04"><strong>A. </strong>Improve Your Performance. </label
        ><input type="radio" name="q2" value="improve" id="qns04" />
        <label for="qns05"><strong>B.</strong>Make you guys bored. </label
        ><input type="radio" name="q2" value="bored" id="qns05" />
        <label for="qns06"><strong>C. </strong>Disturb you guys. </label
        ><input type="radio" name="q2" value="disturb" id="qns06" />
        <label for="qns07"><strong>D. </strong>To eliminate you guys. </label
        ><input type="radio" name="q2" value="eliminate" id="qns07" />
<br>
        <p class="correct" id="qns2ans">Correct!</p>
        <p class="incorrect" id="qns002ans">Incorrect!</p>

        <p><strong>Q3. Who is the Prime Minister of India?</strong></p>
        <label for="qns08"><strong>A. </strong>Narendra Modi </label
        ><input type="radio" name="q3" value="modi" id="qns08" />
        <label for="qns09"><strong>B. </strong>Manmohan Singh </label
        ><input type="radio" name="q3" value="singh" id="qns09" />
        <label for="qns10"><strong>C. </strong>Kejriwal </label
        ><input type="radio" name="q3" value="kejriwal" id="qns10" />
        <label for="qns11"><strong>D. </strong>None of the above </label
        ><input type="radio" name="q3" value="none" id="qns11" />
<br>
        <p class="correct" id="qns3ans">Correct!</p>
        <p class="incorrect" id="qns003ans">Incorrect!</p>

      </section>
    </main>

    <footer id="footer">
