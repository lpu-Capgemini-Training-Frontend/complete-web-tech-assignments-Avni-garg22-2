<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>

  <body>
    <h3 style="text-align: center">
      Please complete all the information below:
    </h3>

    <fieldset>
      <legend>Signup here</legend>

      <form>
        <table align="center">
          <tr >
            <td>
              <label for="name"><strong>Name:</strong></label
              ><br />
              <input type="text" id="name" name="name" placeholder="abc" />
            </td>

            <td>
              <br />
              <input type="text" id="name" name="name" placeholder="xyz" />
            </td>
          </tr>

          <tr>
            <td>
              <label for="email"><strong>Email:</strong></label
              ><br />
              <input
                type="email"
                id="email"
                name="email"
                placeholder="abc@xyz.com"
              />
            </td>

            <td>
              <label for="contact"><strong>Contact:</strong></label
              ><br />
              <input
                type="text"
                id="contact"
                name="contact"
                placeholder="1234567890"
              />
            </td>
          </tr>

          <tr>
            <td>
              <label for="password"><strong>Set password:</strong></label
              ><br />
              <input
                type="password"
                id="password"
                name="password"
                placeholder="Avni$120/"
              />
            </td>

            <td rowspan="3"></td>
          </tr>

          <tr>
            <td>
              <label for="Profile"><strong>Profile:</strong></label
              ><br />
              <input type="file" id="Profile" name="Profile" />
            </td>
          </tr>

          <tr>
            <td>
            <input type="submit" value="Submit" placeholder="Submit">
            </td>
        </tr>
        </table>
      </form>
    </fieldset>
  </body>
</html>
